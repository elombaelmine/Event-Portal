<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>My Calendar</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="page-shell calendar-layout">
    <section class="calendar-card surface">
      <div class="calendar-head">
        <ion-button fill="clear" (click)="goToPreviousMonth()" aria-label="Previous month">
          <ion-icon name="chevron-back-outline" slot="icon-only"></ion-icon>
        </ion-button>

        <h2>{{ displayMonthAndYear }}</h2>

        <ion-button fill="clear" (click)="goToNextMonth()" aria-label="Next month">
          <ion-icon name="chevron-forward-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </div>

      <div class="weekdays">
        <div *ngFor="let dayName of daysOfWeek">{{ dayName }}</div>
      </div>

      <div class="calendar-grid">
        <div *ngFor="let day of calendarDays" class="calendar-day">
          <span *ngIf="day"
            [class.today]="day === todayDay">
            {{ day }}
          </span>

          <div *ngIf="day" class="day-dots">
            <span *ngIf="isRegistered(day)" class="registered-dot"></span>
            <span *ngIf="isHasEvent(day)" class="event-dot"></span>
          </div>
        </div>
      </div>
    </section>

    <aside class="calendar-side">
      <div class="legend">
        <span><i class="registered-dot"></i> Registered</span>
        <span><i class="today-dot"></i> Today</span>
        <span><i class="event-dot"></i> Has Event</span>
      </div>

      <h3>My Registered Events</h3>

      <div *ngIf="registeredEventsList.length > 0; else emptyStateTemplate" class="registered-list">
        <article *ngFor="let reg of registeredEventsList" class="registered-card">
          <div>
            <h4>{{ reg.eventTitle || 'Conference Meeting' }}</h4>
            <p>{{ reg.eventDate }} - {{ reg.eventLocation || 'Main Hall' }}</p>
          </div>
          <span>Confirmed</span>
        </article>
      </div>

      <ng-template #emptyStateTemplate>
        <div class="empty-state">
          <ion-icon name="calendar-outline"></ion-icon>
          <p>No registered events yet.</p>
        </div>
      </ng-template>
    </aside>
  </div>
</ion-content>
