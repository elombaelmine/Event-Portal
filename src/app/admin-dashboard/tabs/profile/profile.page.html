<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Profile</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="page-shell profile-layout">
    <section class="profile-summary surface">
      <div class="avatar-wrap">
        <div class="avatar">
          <img *ngIf="profileImage" [src]="profileImage" alt="Profile image"/>
          <ion-icon *ngIf="!profileImage" name="person-outline"></ion-icon>
        </div>
        <button type="button" (click)="photoInput.click()" aria-label="Change profile photo">
          <ion-icon name="camera-outline"></ion-icon>
        </button>
        <input type="file" accept="image/*" (change)="onPhotoSelected($event)" hidden #photoInput/>
      </div>

      <h1>{{ profile.fullName || 'Admin' }}</h1>
      <span class="admin-id">Admin ID: #{{ adminId }}</span>
    </section>

    <section class="info-stack">
      <div class="info-card surface">
        <h2>Personal Information</h2>

        <div *ngFor="let field of profileFields" class="info-row">
          <label>{{ field.label }}</label>
          <div>
            <ion-input *ngIf="editing === field.key"
              [(ngModel)]="profile[field.key]"
              (ionBlur)="stopEdit()">
            </ion-input>

            <p *ngIf="editing !== field.key">{{ profile[field.key] || '-' }}</p>

            <ion-icon *ngIf="field.key !== 'email'"
              name="pencil-outline"
              (click)="startEdit(field.key)">
            </ion-icon>
            <ion-icon *ngIf="field.key === 'email'" name="lock-closed-outline" class="muted"></ion-icon>
          </div>
        </div>
      </div>

      <div class="info-card stats-card surface">
        <h2>Dashboard Stats</h2>
        <div class="stats-grid">
          <div>
            <strong>{{ totalEvents }}</strong>
            <label>Events</label>
          </div>
          <div>
            <strong>{{ totalRegistrations }}</strong>
            <label>Registrations</label>
          </div>
        </div>
      </div>

      <ion-button expand="block" class="logout-button" (click)="logout()">
        <ion-icon name="log-out-outline" slot="start"></ion-icon>
        Logout
      </ion-button>
    </section>
  </div>
</ion-content>
