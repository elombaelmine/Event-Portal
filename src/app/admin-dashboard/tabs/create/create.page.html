<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>{{ editingId ? 'Edit' : 'Create' }} Event</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="page-shell create-layout">
    <section class="create-intro">
      <p class="eyebrow">Admin workflow</p>
      <h1>{{ editingId ? 'Edit Event' : 'Create New Event' }}</h1>
      <p>Publish clear event details with a cover image, schedule, location, and description.</p>
      <div class="progress-track">
        <span></span>
      </div>
    </section>

    <form class="event-form surface">
      <button class="image-upload" type="button" (click)="imageInput.click()">
        <img *ngIf="form.imageUrl" [src]="form.imageUrl" alt="Selected event cover"/>
        <span [class.has-image]="form.imageUrl">
          <ion-icon name="camera-outline"></ion-icon>
          Upload cover image
        </span>
      </button>
      <input type="file" accept="image/*" (change)="onImageSelected($event)" hidden #imageInput/>

      <div class="field">
        <label>Event Title</label>
        <ion-input [(ngModel)]="form.title" name="title" placeholder="e.g., Annual Tech Symposium"></ion-input>
      </div>

      <div class="field">
        <label>Category</label>
        <div class="category-list">
          <button *ngFor="let cat of categories" type="button"
            (click)="form.category = cat"
            [class.selected]="form.category === cat">
            {{ cat }}
          </button>
        </div>
      </div>

      <div class="field-grid">
        <div class="field icon-field">
          <label>Date</label>
          <div>
            <ion-icon name="calendar-outline"></ion-icon>
            <ion-input type="date" [(ngModel)]="form.date" name="date"></ion-input>
          </div>
        </div>

        <div class="field icon-field">
          <label>Time</label>
          <div>
            <ion-icon name="time-outline"></ion-icon>
            <ion-input type="time" [(ngModel)]="form.time" name="time"></ion-input>
          </div>
        </div>

        <div class="field icon-field">
          <label>End Time</label>
          <div>
            <ion-icon name="time-outline"></ion-icon>
            <ion-input type="time" [(ngModel)]="form.endTime" name="endTime"></ion-input>
          </div>
        </div>
      </div>

      <div class="field icon-field">
        <label>Location</label>
        <div>
          <ion-icon name="location-outline"></ion-icon>
          <ion-input [(ngModel)]="form.location" name="location" placeholder="e.g., Campus Quad or Engineering Hall"></ion-input>
        </div>
      </div>

      <div class="field">
        <label>Description</label>
        <ion-textarea [(ngModel)]="form.description" name="description" rows="5"
          placeholder="Describe the event goals, activities, and who should attend...">
        </ion-textarea>
      </div>

      <div class="form-actions">
        <ion-button expand="block" (click)="saveEvent(false)">
          {{ editingId ? 'Update Event' : 'Publish Event' }}
        </ion-button>

        <ion-button expand="block" fill="outline" (click)="saveEvent(true)">
          Save as Draft
        </ion-button>
      </div>
    </form>
  </div>
</ion-content>
